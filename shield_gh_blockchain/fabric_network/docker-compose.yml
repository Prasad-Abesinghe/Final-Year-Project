version: '3.7'

networks:
  shield_gh_net:
    driver: bridge

services:

  orderer.shield-gh.com:
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/shield-gh.com/orderers/orderer.shield-gh.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/shield-gh.com/orderers/orderer.shield-gh.com/tls:/var/hyperledger/orderer/tls
    ports:
      - "7050:7050"
    networks:
      - shield_gh_net

  peer0.rsu1.shield-gh.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=shield_gh_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.rsu1.shield-gh.com
      - CORE_PEER_ADDRESS=peer0.rsu1.shield-gh.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.rsu1.shield-gh.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.rsu1.shield-gh.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.rsu1.shield-gh.com:7051
      - CORE_PEER_LOCALMSPID=RSU1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/rsu1.shield-gh.com/peers/peer0.rsu1.shield-gh.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/rsu1.shield-gh.com/peers/peer0.rsu1.shield-gh.com/tls:/etc/hyperledger/fabric/tls
    ports:
      - "7051:7051"
    networks:
      - shield_gh_net

  peer0.rsu2.shield-gh.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=shield_gh_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.rsu2.shield-gh.com
      - CORE_PEER_ADDRESS=peer0.rsu2.shield-gh.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.rsu2.shield-gh.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.rsu2.shield-gh.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.rsu2.shield-gh.com:8051
      - CORE_PEER_LOCALMSPID=RSU2MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/rsu2.shield-gh.com/peers/peer0.rsu2.shield-gh.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/rsu2.shield-gh.com/peers/peer0.rsu2.shield-gh.com/tls:/etc/hyperledger/fabric/tls
    ports:
      - "8051:8051"
    networks:
      - shield_gh_net
