version: "3.9"

services:

  # ── 1. Run blockchain + FL + LLM pipeline, write results to volumes ─
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - bc_output:/app/shield_gh_blockchain/output
      - fl_output:/app/shield_gh_fl/output
      - llm_output:/app/shield_gh_llm/output
      - ns3_input:/app/ns3_input:ro
    restart: "no"

  # ── 2. FastAPI — reads from volumes, serves REST endpoints ──────
  backend:
    build:
      context: .
      dockerfile: shield_gh_dashboard/backend/Dockerfile
    volumes:
      - bc_output:/app/shield_gh_blockchain/output:ro
      - fl_output:/app/shield_gh_fl/output:ro
      - llm_output:/app/shield_gh_llm/output:ro
      - ns3_input:/app/ns3_input
    expose:
      - "8000"
    depends_on:
      pipeline:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── 3. Nginx — serves React SPA + proxies /api/ to backend ─────
  frontend:
    build:
      context: .
      dockerfile: shield_gh_dashboard/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  bc_output:
  fl_output:
  llm_output:
  ns3_input:
